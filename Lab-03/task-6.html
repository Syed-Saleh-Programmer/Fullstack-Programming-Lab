<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 6: Mini University Portal</title>
    <style>
        :root { --bg: #0b1120; --panel: #0f172a; --accent: #22c55e; --text: #e2e8f0; }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 24px; background: radial-gradient(circle at 20% 20%, rgba(34,197,94,0.18), transparent 30%), var(--bg); color: var(--text); }
        .container { max-width: 920px; margin: 0 auto; background: var(--panel); padding: 24px; border-radius: 16px; box-shadow: 0 18px 40px rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.05); }
        .form-group { margin-bottom: 24px; padding: 16px; border-radius: 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.04); }
        input, button { padding: 12px; margin: 6px 0; width: 100%; border-radius: 10px; border: 1px solid #1f2937; background: #0b1220; color: var(--text); }
        button { background: linear-gradient(135deg, #22c55e, #16a34a); border: none; cursor: pointer; font-weight: 700; box-shadow: 0 12px 24px rgba(22,163,74,0.35); }
        .dashboard { margin-top: 20px; display: grid; gap: 12px; }
        .log { background: #0b1220; color: #22c55e; padding: 12px; font-family: 'JetBrains Mono', monospace; height: 170px; overflow-y: auto; border-radius: 10px; border: 1px solid #1f2937; }
        .badges { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
        .badge { padding: 8px 12px; border-radius: 999px; background: rgba(34,197,94,0.15); color: #4ade80; font-weight: 700; }
        .list-card { padding: 14px; border-radius: 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div class="container">
        <h1>University Portal</h1>
        
        <div class="form-group">
            <h3>Register Student</h3>
            <input type="number" id="stuId" placeholder="Student ID">
            <input type="text" id="stuName" placeholder="Full Name">
            <input type="text" id="stuCourses" placeholder="Courses (comma separated)">
            <button id="register">Register & Save</button>
        </div>

        <div class="badges">
            <div class="badge" id="count">Students: 0</div>
            <div class="badge" id="courseCount">Total Unique Courses: 0</div>
        </div>

        <div class="dashboard">
            <div>
                <h3>Filter</h3>
                <div class="form-group">
                    <input type="text" id="filter" placeholder="Filter by name or course">
                </div>
            </div>
            <div>
                <h3>System Log</h3>
                <div id="log" class="log">Simulating server connection...<br></div>
            </div>
            <div class="list-card">
                <h3>Registered Students (Map)</h3>
                <div id="studentList"></div>
            </div>
        </div>
    </div>

    <script>
        class Student {
            constructor(id, name) {
                this.id = id;
                this.name = name;
                this.courses = new Set();
            }

            addCourse(course) {
                this.courses.add(course.trim());
            }
        }

        const universityDb = new Map();

        const logDiv = document.getElementById('log');
        const listDiv = document.getElementById('studentList');
        const countBadge = document.getElementById('count');
        const courseCountBadge = document.getElementById('courseCount');
        const filterInput = document.getElementById('filter');

        function log(msg) {
            logDiv.innerHTML += `> ${msg}<br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function registerStudent() {
            const id = parseInt(document.getElementById('stuId').value);
            const name = document.getElementById('stuName').value.trim();
            const coursesInput = document.getElementById('stuCourses').value;

            if (!id || !name) {
                alert("Please fill ID and Name");
                return;
            }

            if (universityDb.has(id)) {
                log(`Error: Student ID ${id} already exists.`);
                return;
            }

            const newStudent = new Student(id, name);
            if (coursesInput) {
                coursesInput.split(',').forEach(c => newStudent.addCourse(c));
            }

            saveData(newStudent)
                .then(savedStudent => {
                    universityDb.set(savedStudent.id, savedStudent);
                    log(`Success: ${savedStudent.name} saved to database.`);
                    updateUI();
                    clearForm();
                })
                .catch(err => {
                    log(`Error: ${err}`);
                });
        }

        function saveData(student) {
            log(`Attempting to save ${student.name}...`);
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    const success = Math.random() > 0.2;
                    if (success) {
                        resolve(student);
                    } else {
                        reject("Database timeout / Connection failed.");
                    }
                }, 1200);
            });
        }

        function updateUI() {
            const term = filterInput.value.toLowerCase();
            let html = '';
            let totalCourses = new Set();
            universityDb.forEach((student, id) => {
                if (term && !student.name.toLowerCase().includes(term) && !Array.from(student.courses).some(c => c.toLowerCase().includes(term))) return;
                totalCourses = new Set([...totalCourses, ...student.courses]);
                html += `<p><strong>${id}:</strong> ${student.name} — Courses: ${Array.from(student.courses).join(', ')}</p>`;
            });
            listDiv.innerHTML = html || "No students registered.";
            countBadge.textContent = `Students: ${universityDb.size}`;
            courseCountBadge.textContent = `Total Unique Courses: ${totalCourses.size}`;
        }

        function clearForm() {
            document.getElementById('stuId').value = '';
            document.getElementById('stuName').value = '';
            document.getElementById('stuCourses').value = '';
        }

        document.getElementById('register').addEventListener('click', registerStudent);
        filterInput.addEventListener('input', updateUI);
    </script>
</body>
</html>
