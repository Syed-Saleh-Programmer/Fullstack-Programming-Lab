<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 7: Student Data Using JSON</title>
    <style>
        :root { --bg: #0b1220; --panel: #0f172a; --accent: #fbbf24; --text: #e2e8f0; }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', monospace; padding: 24px; background: radial-gradient(circle at 20% 20%, rgba(251,191,36,0.12), transparent 30%), var(--bg); color: var(--text); margin: 0; }
        h1 { letter-spacing: -0.4px; }
        .section { margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.06); padding: 14px; background: var(--panel); border-radius: 12px; box-shadow: 0 12px 24px rgba(0,0,0,0.25); }
        h2 { border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 6px; color: var(--accent); margin-top: 0; }
        .data-display { white-space: pre-wrap; color: #a5d6a7; background: #0b1220; padding: 12px; border-radius: 10px; border: 1px solid #1f2937; }
        .student-card { background: #111827; padding: 12px; margin: 6px 0; border-left: 4px solid #fbbf24; border-radius: 10px; }
        button { padding: 10px 14px; border: none; border-radius: 10px; background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #0b1220; font-weight: 700; cursor: pointer; box-shadow: 0 10px 20px rgba(245,158,11,0.35); }
        input { padding: 10px; border-radius: 10px; border: 1px solid #1f2937; background: #0b1220; color: var(--text); width: 100%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 10px; margin-bottom: 10px; }
        .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    </style>
</head>
<body>
    <h1>JSON Data Handling</h1>

    <div class="section">
        <h2>1. Add Student</h2>
        <div class="grid">
            <input type="text" id="name" placeholder="Name">
            <input type="number" id="age" placeholder="Age">
            <input type="number" id="semester" placeholder="Semester">
            <input type="text" id="courses" placeholder="Courses (comma separated)">
        </div>
        <div class="actions">
            <button id="add">Add Student</button>
            <button id="sample">Add Sample</button>
            <button id="copy">Copy JSON</button>
        </div>
    </div>

    <div class="section">
        <h2>2. JSON String</h2>
        <div id="jsonString" class="data-display"></div>
    </div>

    <div class="section">
        <h2>3. Parsed Objects</h2>
        <div id="parsed" class="data-display"></div>
    </div>

    <div class="section">
        <h2>4. Displayed Info</h2>
        <div id="display"></div>
    </div>

    <script>
        const students = [
            { name: "John Doe", age: 20, semester: 4, courses: ["Math", "Physics"] },
            { name: "Jane Smith", age: 22, semester: 6, courses: ["Biology", "Chemistry"] },
            { name: "Emily Davis", age: 19, semester: 2, courses: ["History", "Art"] }
        ];

        const jsonStringEl = document.getElementById('jsonString');
        const parsedEl = document.getElementById('parsed');
        const displayEl = document.getElementById('display');

        function render() {
            const jsonString = JSON.stringify(students, null, 2);
            jsonStringEl.textContent = jsonString;
            const parsedStudents = JSON.parse(jsonString);
            parsedEl.textContent = `Parsed ${parsedStudents.length} students.`;
            displayEl.innerHTML = parsedStudents.map(student => {
                const { name, age, semester, courses } = student;
                return `
                    <div class="student-card">
                        <h3>${name}</h3>
                        <p>Age: ${age} | Semester: ${semester}</p>
                        <p>Courses: ${courses.join(', ')}</p>
                    </div>
                `;
            }).join('');
        }

        function addStudent(name, age, semester, courses) {
            if (!name || !age || !semester) return;
            students.push({ name, age, semester, courses });
            render();
        }

        document.getElementById('add').addEventListener('click', () => {
            const name = document.getElementById('name').value.trim();
            const age = parseInt(document.getElementById('age').value);
            const semester = parseInt(document.getElementById('semester').value);
            const courses = document.getElementById('courses').value.split(',').map(c => c.trim()).filter(Boolean);
            addStudent(name, age, semester, courses.length ? courses : ["TBD"]);
            document.getElementById('name').value = '';
            document.getElementById('age').value = '';
            document.getElementById('semester').value = '';
            document.getElementById('courses').value = '';
        });

        document.getElementById('sample').addEventListener('click', () => {
            addStudent('Liam Carter', 21, 5, ['AI', 'Data Mining']);
        });

        document.getElementById('copy').addEventListener('click', () => {
            navigator.clipboard.writeText(JSON.stringify(students, null, 2));
            parsedEl.textContent = 'JSON copied to clipboard.';
        });

        render();
    </script>
</body>
</html>
