<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 3: Asynchronous Data Loader</title>
    <style>
        :root { --bg: #0d0f1a; --panel: #11172a; --accent: #22d3ee; --error: #f43f5e; --text: #e2e8f0; }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh; display: grid; place-items: center; background: radial-gradient(circle at 20% 20%, rgba(34,211,238,0.12), transparent 28%), var(--bg); color: var(--text); padding: 20px; }
        .card { width: min(860px, 100%); background: var(--panel); padding: 28px; border-radius: 18px; box-shadow: 0 16px 40px rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.04); }
        h1 { margin-top: 0; letter-spacing: -0.5px; }
        .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
        button { padding: 12px 16px; border: none; border-radius: 10px; background: linear-gradient(135deg, #22d3ee, #3b82f6); color: #0b1021; font-weight: 700; cursor: pointer; box-shadow: 0 12px 30px rgba(34,211,238,0.3); }
        button.secondary { background: #1f2937; color: #e2e8f0; box-shadow: none; border: 1px solid #263142; }
        .toggle { display: flex; align-items: center; gap: 8px; }
        .loader { width: 38px; height: 38px; border: 4px solid rgba(255,255,255,0.15); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 10px auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap: 12px; margin-top: 12px; }
        .user-card { padding: 14px; border-radius: 12px; background: #0f172a; border: 1px solid #1f2937; box-shadow: inset 0 1px 0 rgba(255,255,255,0.03); }
        .muted { color: #94a3b8; font-size: 13px; }
        .error { color: var(--error); font-weight: 700; text-align: center; }
        .status { display: inline-flex; align-items: center; gap: 6px; padding: 8px 12px; border-radius: 10px; background: rgba(34,211,238,0.12); color: var(--accent); }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <h1>User Data Loader</h1>
        <div class="controls">
            <button id="load">Load Users</button>
            <button id="fail" class="secondary">Simulate Failure</button>
            <div class="toggle">
                <input type="checkbox" id="slow" checked>
                <label for="slow">3s delay</label>
            </div>
        </div>
        <div id="status" class="status">Idle</div>
        <div id="loading" style="display:none;">
            <div class="loader"></div>
            <div class="muted">Fetching data...</div>
        </div>
        <div id="user-container" class="grid"></div>
    </div>

    <script>
        const userContainer = document.getElementById('user-container');
        const loadingDiv = document.getElementById('loading');
        const statusBadge = document.getElementById('status');
        const delayToggle = document.getElementById('slow');

        function fetchUsers(shouldFail) {
            return new Promise((resolve, reject) => {
                const delay = delayToggle.checked ? 3000 : 600;
                setTimeout(() => {
                    if (shouldFail) {
                        reject("Failed to fetch user data.");
                    } else {
                        resolve([
                            { id: 1, name: "Alice", role: "Admin" },
                            { id: 2, name: "Bob", role: "User" },
                            { id: 3, name: "Charlie", role: "User" }
                        ]);
                    }
                }, delay);
            });
        }

        function renderUsers(users) {
            userContainer.innerHTML = users.map(u => `
                <div class="user-card">
                    <h3>${u.name}</h3>
                    <p class="muted">ID: ${u.id}</p>
                    <p>Role: ${u.role}</p>
                </div>
            `).join('');
        }

        function setLoading(state) {
            loadingDiv.style.display = state ? 'block' : 'none';
            statusBadge.textContent = state ? 'Loading...' : 'Idle';
        }

        function runRequest(shouldFail) {
            setLoading(true);
            userContainer.innerHTML = '';
            fetchUsers(shouldFail)
                .then(users => {
                    setLoading(false);
                    statusBadge.textContent = 'Loaded';
                    renderUsers(users);
                })
                .catch(err => {
                    setLoading(false);
                    statusBadge.textContent = 'Error';
                    userContainer.innerHTML = `<p class="error">${err}</p>`;
                });
        }

        document.getElementById('load').addEventListener('click', () => runRequest(false));
        document.getElementById('fail').addEventListener('click', () => runRequest(true));
    </script>
</body>
</html>
