<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 2: Online Shopping Cart</title>
    <style>
        :root {
            --bg: #0b1021;
            --panel: #11162b;
            --accent: #f59e0b;
            --text: #e2e8f0;
            --muted: #94a3b8;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            padding: 28px;
            background: radial-gradient(circle at 20% 20%, rgba(245,158,11,0.08), transparent 30%), var(--bg);
            color: var(--text);
        }
        .container {
            max-width: 760px;
            margin: 0 auto;
            background: var(--panel);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 18px 40px rgba(0,0,0,0.35);
        }
        h2 { margin-top: 0; letter-spacing: -0.5px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 12px; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #1f2937; background: #0f172a; color: var(--text); }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #f59e0b, #f97316);
            color: #0b1021;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.2s ease;
            box-shadow: 0 12px 30px rgba(249, 115, 22, 0.35);
        }
        button:hover { transform: translateY(-1px); }
        .output {
            margin-top: 14px;
            padding: 16px;
            border-radius: 12px;
            background: #0f172a;
            border: 1px solid #1f2937;
            font-family: 'JetBrains Mono', monospace;
            line-height: 1.5;
        }
        .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
        .chip { background: rgba(245,158,11,0.12); color: #fbbf24; padding: 6px 10px; border-radius: 999px; font-size: 12px; }
        .row { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 10px; margin-top: 12px; }
        .stat { padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.05); }
        .muted { color: var(--muted); font-size: 13px; }
        .list { margin-top: 12px; display: grid; gap: 8px; }
        .item { display: flex; justify-content: space-between; background: rgba(255,255,255,0.03); padding: 10px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div class="container">
        <h2>Shopping Cart</h2>
        <div class="grid">
            <input type="text" id="item" placeholder="Item name">
            <input type="number" id="qty" placeholder="Quantity" min="1">
            <button id="add">Add To Cart</button>
            <button id="random">Add Sample Bundle</button>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="muted">Total Items</div>
                <div id="totalCount" style="font-size:22px;font-weight:700;">0</div>
            </div>
            <div class="stat">
                <div class="muted">First Item</div>
                <div id="firstItem" style="font-size:22px;font-weight:700;">-</div>
            </div>
            <div class="stat">
                <div class="muted">Remaining</div>
                <div id="remaining" style="font-size:22px;font-weight:700;">-</div>
            </div>
        </div>

        <div class="output" id="cart-display">Processing cart items...</div>
        <div class="chips" id="chipRow"></div>
        <div class="list" id="list"></div>
    </div>

    <script>
        const cartDisplay = document.getElementById('cart-display');
        const chipRow = document.getElementById('chipRow');
        const list = document.getElementById('list');
        const totalCount = document.getElementById('totalCount');
        const firstItemEl = document.getElementById('firstItem');
        const remainingEl = document.getElementById('remaining');

        let cart = ["Laptop", "Mouse"];

        const addToCart = (...newItems) => {
            cart = [...cart, ...newItems];
            displayCartInfo();
        };

        const displayCartInfo = () => {
            const cartClone = [...cart];
            const [firstItem, ...remainingItems] = cartClone;
            const totalItems = cartClone.length;

            cartDisplay.innerHTML = `
                <strong>Cart Snapshot:</strong> ${JSON.stringify(cartClone)}
            `;

            chipRow.innerHTML = cartClone.map(item => `<span class="chip">${item}</span>`).join('');

            list.innerHTML = cartClone.map((item, idx) => `<div class="item"><span>#${idx + 1} ${item}</span><button data-remove="${idx}" style="width:auto;padding:6px 10px;background:#ef4444;color:white;">Remove</button></div>`).join('');

            totalCount.textContent = totalItems;
            firstItemEl.textContent = firstItem || '-';
            remainingEl.textContent = remainingItems.length ? remainingItems.join(', ') : '-';
        };

        list.addEventListener('click', e => {
            const idx = e.target.getAttribute('data-remove');
            if (idx !== null) {
                cart = [...cart.slice(0, idx), ...cart.slice(Number(idx) + 1)];
                displayCartInfo();
            }
        });

        document.getElementById('add').addEventListener('click', () => {
            const item = document.getElementById('item').value.trim();
            const qty = Math.max(1, parseInt(document.getElementById('qty').value) || 1);
            if (!item) return;
            const items = Array(qty).fill(item);
            addToCart(...items);
            document.getElementById('item').value = '';
            document.getElementById('qty').value = '';
        });

        document.getElementById('random').addEventListener('click', () => {
            addToCart("Keyboard", "Headphones", "Charger");
        });

        addToCart("Keyboard", "Headphones");
    </script>
</body>
</html>
