<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chained Style Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Chained Style Editor</h1>
        
        <div class="text-box" id="textBox">
            <p id="editableText">
                This is a sample text that you can style using the buttons below. 
                Try different combinations of styles to see how chaining works. 
                Click the buttons to change font size, colors, and text styles instantly!
            </p>
        </div>

        <div class="controls">
            <div class="control-group">
                <h3>Font Size</h3>
                <button onclick="changeFontSize('small')">Small</button>
                <button onclick="changeFontSize('medium')">Medium</button>
                <button onclick="changeFontSize('large')">Large</button>
                <button onclick="changeFontSize('xlarge')">X-Large</button>
            </div>

            <div class="control-group">
                <h3>Text Color</h3>
                <button onclick="changeTextColor('#000000')" style="background: #000000; color: white;">Black</button>
                <button onclick="changeTextColor('#e74c3c')" style="background: #e74c3c; color: white;">Red</button>
                <button onclick="changeTextColor('#3498db')" style="background: #3498db; color: white;">Blue</button>
                <button onclick="changeTextColor('#2ecc71')" style="background: #2ecc71; color: white;">Green</button>
                <button onclick="changeTextColor('#9b59b6')" style="background: #9b59b6; color: white;">Purple</button>
            </div>

            <div class="control-group">
                <h3>Background Color</h3>
                <button onclick="changeBgColor('#ffffff')" style="background: #ffffff; border: 2px solid #ddd;">White</button>
                <button onclick="changeBgColor('#f8f9fa')" style="background: #f8f9fa;">Light Gray</button>
                <button onclick="changeBgColor('#fff3cd')" style="background: #fff3cd;">Light Yellow</button>
                <button onclick="changeBgColor('#d1ecf1')" style="background: #d1ecf1;">Light Blue</button>
                <button onclick="changeBgColor('#d4edda')" style="background: #d4edda;">Light Green</button>
            </div>

            <div class="control-group">
                <h3>Text Style</h3>
                <button onclick="toggleBold()" id="boldBtn">Bold</button>
                <button onclick="toggleItalic()" id="italicBtn">Italic</button>
                <button onclick="toggleUnderline()" id="underlineBtn">Underline</button>
            </div>

            <div class="control-group">
                <h3>Quick Actions</h3>
                <button onclick="applyPreset1()" class="preset-btn">Preset 1</button>
                <button onclick="applyPreset2()" class="preset-btn">Preset 2</button>
                <button onclick="applyPreset3()" class="preset-btn">Preset 3</button>
                <button onclick="resetStyles()" class="reset-btn">Reset All</button>
            </div>
        </div>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
